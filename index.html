<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANDAL // STREET CULTURE</title>
    <style>
        /* עיצוב ברוטליסטי - בלי מעגלים, בלי טשטושים, הכל ישר ובוט */
        :root {
            --bg-color: #0F0F0F;
            --text-color: #FFFFFF;
            --accent-color: #E6FF00; /* צהוב ניאון רעיל */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Arial Black', sans-serif;
            overflow-x: hidden;
            padding: 20px;
        }

        /* גריד קשוח */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

        header {
            border: 4px solid var(--text-color);
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        h1 { font-size: 8vw; line-height: 0.9; text-transform: uppercase; }

        .big-box {
            border: 4px solid var(--accent-color);
            padding: 40px;
            background: #1a1a1a;
            position: relative;
        }

        .product-img {
            width: 100%;
            height: 300px;
            background: #333;
            border: 2px solid white;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        .price-tag {
            background: var(--accent-color);
            color: black;
            display: inline-block;
            padding: 5px 15px;
            font-weight: 900;
        }

        button {
            background: black;
            color: white;
            border: 2px solid white;
            padding: 20px;
            width: 100%;
            font-size: 1.5rem;
            margin-top: 20px;
            text-transform: uppercase;
            font-weight: 900;
        }

        button:hover { background: var(--accent-color); color: black; }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            h1 { font-size: 15vw; }
        }
    </style>
</head>
<body>

    <header>
        <div>VANDAL.CO</div>
        <div>MENU ☰</div>
    </header>

    <h1>WE ARE<br>NOT<br>PRETTY.</h1>

    <div class="container" style="margin-top: 50px;">
        <div class="big-box">
            <div class="product-img">🛹</div>
            <h2>VANDAL PRO DECK</h2>
            <div class="price-tag">89$</div>
            <button>ADD TO CART</button>
        </div>
        <div class="big-box">
            <div class="product-img">👕</div>
            <h2>RAGS HOODIE</h2>
            <div class="price-tag">120$</div>
            <button>ADD TO CART</button>
        </div>
    </div>

    <section style="margin-top: 50px; border: 4px dashed white; padding: 50px;">
        <h2 style="font-size: 3rem;">DROP INFO: 20.07.26 // 22:00</h2>
        <p style="margin-top: 20px; font-size: 1.5rem;">NO RULES. NO FILTERS. JUST GEAR.</p>
    </section>

</body>
</html>
