<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>כרמי גליל | שמן זית איכותי</title>
    <style>
        :root {
            --olive-green: #4b5d2f;
            --light-olive: #8d9e77;
            --cream: #f4f1ea;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--cream);
            color: #333;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            background: linear-gradient(rgba(75, 93, 47, 0.6), rgba(75, 93, 47, 0.3)), 
                        url('https://images.unsplash.com/photo-1474939561930-990c743c6833?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
        }

        h1 { font-size: 4rem; margin-bottom: 10px; }

        /* Animated Olive Tree Section */
        .parallax-section {
            padding: 100px 20px;
            text-align: center;
            background: var(--cream);
        }

        .olive-tree-icon {
            font-size: 80px;
            transition: transform 0.5s ease-out;
            display: inline-block;
        }

        /* Content Styling */
        .section-content {
            max-width: 800px;
            margin: auto;
            line-height: 1.6;
        }

        .cta-button {
            display: block;
            width: 200px;
            margin: 50px auto;
            padding: 15px;
            background-color: var(--olive-green);
            color: white;
            text-align: center;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: 0.3s;
        }

        .cta-button:hover { background-color: #35441d; transform: scale(1.05); }

    </style>
</head>
<body>

    <section class="hero">
        <div>
            <h1>כרמי גליל</h1>
            <p>שמן זית בכבישה קרה מהגליל העליון</p>
        </div>
    </section>

    <section class="parallax-section">
        <h2>הטבע בבקבוק</h2>
        <div class="olive-tree-icon" id="tree">🌳</div>
        <div class="section-content">
            <p>אנחנו מאמינים במסורת. בכל שנה, כשהזיתים מבשילים, אנחנו מוסקים אותם בעבודת יד ומפיקים שמן זית בעל טעם עמוק וייחודי.</p>
            <img src="https://images.unsplash.com/photo-1592419044706-397d64b0f323?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" style="width: 100%; border-radius: 10px; margin-top: 20px;">
        </div>
    </section>

    <a href="mailto:info@karmi-galil.co.il" class="cta-button">ליצירת קשר</a>

    <script>
        // אנימציית גלילה פשוטה לעץ
        window.addEventListener('scroll', () => {
            const tree = document.getElementById('tree');
            let scrollPos = window.scrollY;
            tree.style.transform = `rotate(${scrollPos / 10}deg) scale(${1 + scrollPos/2000})`;
        });
    </script>
</body>
</html>
