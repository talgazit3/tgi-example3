<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>MODA - אופנת בוטיק</title>
    <style>
        :root { --main-color: #d4a373; --bg: #fefae0; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); }
        nav { padding: 20px; background: #fff; display: flex; justify-content: space-around; position: sticky; top: 0; }
        .page { display: none; padding: 40px; min-height: 80vh; }
        .active { display: block; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; text-align: center; border-radius: 10px; }
        button { background: var(--main-color); color: white; border: none; padding: 10px 20px; cursor: pointer; }
        footer { text-align: center; padding: 20px; background: #333; color: white; }
    </style>
</head>
<body>

<nav>
    <a href="#" onclick="showPage('home')">בית</a>
    <a href="#" onclick="showPage('shop')">חנות</a>
    <a href="#" onclick="showPage('about')">אודות</a>
    <a href="#" onclick="showPage('cart')">סל קניות (<span id="cart-count">0</span>)</a>
</nav>

<!-- דף הבית -->
<section id="home" class="page active">
    <h1>ברוכים הבאים ל-MODA</h1>
    <p>הקולקציה החדשה שלנו כאן. עיצובים על זמניים לאנשים עם סטייל.</p>
</section>

<!-- דף חנות -->
<section id="shop" class="page">
    <h2>הקולקציה שלנו</h2>
    <div class="product-grid">
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="חולצה">
            <h3>חולצת פשתן</h3>
            <p>150 ₪</p>
            <button onclick="addToCart('חולצת פשתן', 150)">הוסף לסל</button>
        </div>
        <div class="card">
            <img src="https://via.placeholder.com/150" alt="מכנס">
            <h3>מכנס מחוייט</h3>
            <p>250 ₪</p>
            <button onclick="addToCart('מכנס מחוייט', 250)">הוסף לסל</button>
        </div>
    </div>
</section>

<!-- דף אודות -->
<section id="about" class="page">
    <h2>אודות המותג</h2>
    <p>אנחנו מאמינים באופנה בת קיימא ואיכות בלתי מתפשרת.</p>
</section>

<!-- דף סל -->
<section id="cart" class="page">
    <h2>הסל שלך</h2>
    <div id="cart-items"></div>
    <h3 id="total">סה"כ: 0 ₪</h3>
    <button onclick="alert('תודה על רכישתך!')">סיום הזמנה</button>
</section>

<script>
    let cart = [];
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
    function addToCart(name, price) {
        cart.push({name, price});
        document.getElementById('cart-count').innerText = cart.length;
        updateCartUI();
    }
    function updateCartUI() {
        const container = document.getElementById('cart-items');
        container.innerHTML = cart.map(item => `<p>${item.name} - ${item.price} ₪</p>`).join('');
        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('total').innerText = `סה"כ: ${total} ₪`;
    }
</script>

<footer>© 2026 MODA - כל הזכויות שמורות</footer>
</body>
</html>
